{% extends "base.html" %}
{% block title %}{{ cliente.nombre }} — Estética{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-person-circle me-2" style="color:#7b2d8b"></i>{{ cliente.nombre }}</h4>
  <div>
    <a href="{% url 'clientes:update' cliente.pk %}" class="btn btn-primary btn-sm me-2"><i class="bi bi-pencil me-1"></i>Editar</a>
    <a href="{% url 'clientes:list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  </div>
</div>
<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <dl class="row mb-0">
      <dt class="col-sm-4">Teléfono</dt><dd class="col-sm-8">{{ cliente.telefono }}</dd>
      <dt class="col-sm-4">Email</dt><dd class="col-sm-8">{{ cliente.email|default:"—" }}</dd>
      <dt class="col-sm-4">Registro</dt><dd class="col-sm-8">{{ cliente.fecha_registro|date:"d/m/Y H:i" }}</dd>
    </dl>
  </div>
</div>
{% endblock %}
