<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Estética</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #7b2d8b 0%, #a94bb8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .login-header {
      background-color: #7b2d8b;
      color: #fff;
      border-radius: 16px 16px 0 0;
      padding: 32px 24px 24px;
      text-align: center;
    }
    .login-header i { font-size: 2.5rem; }
    .login-body { padding: 28px 32px 32px; }
    .btn-login {
      background-color: #7b2d8b;
      border-color: #7b2d8b;
      color: #fff;
      width: 100%;
      padding: 10px;
      font-size: 1rem;
    }
    .btn-login:hover {
      background-color: #5e2069;
      border-color: #5e2069;
      color: #fff;
    }
    .form-control:focus {
      border-color: #a94bb8;
      box-shadow: 0 0 0 0.2rem rgba(123,45,139,0.25);
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <i class="bi bi-scissors"></i>
      <h4 class="mt-2 mb-0 fw-bold">Estética</h4>
      <p class="mb-0 opacity-75 small">Sistema de gestión</p>
    </div>
    <div class="login-body">
      {% if form.errors %}
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-triangle me-1"></i>
          Usuario o contraseña incorrectos.
        </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="id_username">
            <i class="bi bi-person me-1"></i>Usuario
          </label>
          <input type="text" name="username" id="id_username"
                 class="form-control" placeholder="Ingresa tu usuario" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" for="id_password">
            <i class="bi bi-lock me-1"></i>Contraseña
          </label>
          <input type="password" name="password" id="id_password"
                 class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
