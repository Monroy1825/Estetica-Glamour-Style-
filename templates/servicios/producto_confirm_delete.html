{% extends "base.html" %}
{% block title %}Eliminar producto — Estética{% endblock %}
{% block content %}
<div class="card shadow-sm" style="max-width:420px">
  <div class="card-body">
    <h5 class="text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Eliminar producto</h5>
    <p>¿Confirmas eliminar <strong>{{ producto.nombre }}</strong>?</p>
    <form method="post">{% csrf_token %}
      <a href="{% url 'servicios:producto_list' %}" class="btn btn-outline-secondary me-2">Cancelar</a>
      <button type="submit" class="btn btn-danger">Eliminar</button>
    </form>
  </div>
</div>
{% endblock %}
