{% extends "base.html" %}
{% block title %}{{ servicio.nombre }} — Estética{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-stars me-2" style="color:#7b2d8b"></i>{{ servicio.nombre }}</h4>
  <div>
    <a href="{% url 'servicios:servicio_update' servicio.pk %}" class="btn btn-primary btn-sm me-2"><i class="bi bi-pencil me-1"></i>Editar</a>
    <a href="{% url 'servicios:servicio_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  </div>
</div>
<div class="card shadow-sm" style="max-width:420px">
  <div class="card-body">
    <dl class="row mb-0">
      <dt class="col-sm-5">Categoría</dt><dd class="col-sm-7">{{ servicio.get_categoria_display }}</dd>
      <dt class="col-sm-5">Precio base</dt><dd class="col-sm-7">${{ servicio.precio_base }}</dd>
    </dl>
  </div>
</div>
{% endblock %}
