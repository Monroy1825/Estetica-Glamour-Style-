{% extends "base.html" %}
{% block title %}{{ titulo }} — Estética{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-box-seam me-2" style="color:#7b2d8b"></i>{{ titulo }}</h4>
  <a href="{% url 'servicios:producto_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>
<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}

      {% for field in form %}
        <div class="mb-3">
          <label for="{{ field.id_for_label }}" class="form-label fw-semibold" id="label_{{ field.name }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>Guardar
        </button>
        <a href="{% url 'servicios:producto_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var selectPresentacion = document.getElementById('id_presentacion');
  var selectTamano      = document.getElementById('id_tamano');
  var labelTamano       = document.getElementById('label_tamano');
  var valorActual       = selectTamano ? selectTamano.getAttribute('data-value') || '{{ form.instance.tamano|escapejs }}' : '';

  var OPCIONES = {
    'frasco':  ['— Selecciona —', '50 ml', '100 ml', '200 ml', '300 ml', '500 ml', '1000 ml'],
    'botella': ['— Selecciona —', '50 ml', '100 ml', '200 ml', '300 ml', '500 ml', '1000 ml'],
    'tubo':    ['— Selecciona —', '50 ml', '75 ml', '100 ml', '150 ml'],
    'pieza':   ['— Selecciona —', 'Chico', 'Mediano', 'Grande'],
    'otro':    [
      '— Selecciona —',
      '15 ml', '30 ml', '50 ml', '75 ml', '100 ml', '120 ml', '150 ml',
      '200 ml', '250 ml', '300 ml', '400 ml', '500 ml', '750 ml', '1 L', '2 L', '5 L',
      '10 g', '25 g', '50 g', '100 g', '150 g', '200 g', '300 g', '500 g', '1 kg', '2 kg',
      'Paquete chico', 'Paquete mediano', 'Paquete grande'
    ],
  };

  var ETIQUETAS = {
    'frasco':  'Volumen (ml)',
    'botella': 'Volumen (ml)',
    'tubo':    'Tamaño',
    'pieza':   'Tamaño',
    'otro':    'Tamaño',
  };

  function actualizarTamano(presentacion) {
    if (!selectTamano) return;

    var opciones = OPCIONES[presentacion] || OPCIONES['otro'];
    var etiqueta = ETIQUETAS[presentacion] || 'Tamaño';

    if (labelTamano) labelTamano.textContent = etiqueta;

    selectTamano.innerHTML = '';
    opciones.forEach(function (op, i) {
      var opt = document.createElement('option');
      opt.value = i === 0 ? '' : op;
      opt.textContent = op;
      if (op === valorActual) opt.selected = true;
      selectTamano.appendChild(opt);
    });
  }

  if (selectPresentacion) {
    actualizarTamano(selectPresentacion.value);

    selectPresentacion.addEventListener('change', function () {
      valorActual = '';
      actualizarTamano(this.value);
    });
  }
});
</script>
{% endblock %}
