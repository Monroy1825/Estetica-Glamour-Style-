<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Glamour Style{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7b2d8b;
      --primary-light: #f3e8f7;
      --primary-dark: #5a1f66;
    }
    body {
      background: #f9f6fb;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .portal-header {
      background: var(--primary);
      color: #fff;
      padding: 16px 0;
      box-shadow: 0 2px 8px rgba(123,45,139,0.15);
    }
    .portal-header .brand {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .portal-header .tagline {
      font-size: 0.78rem;
      opacity: 0.85;
    }
    .portal-nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .portal-nav a:hover, .portal-nav a.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
    .portal-footer {
      background: var(--primary);
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 16px;
      font-size: 0.78rem;
      margin-top: 48px;
    }
    .btn-primary-portal {
      background: var(--primary);
      border: none;
      color: #fff;
      padding: 10px 28px;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-primary-portal:hover {
      background: var(--primary-dark);
      color: #fff;
    }
    .btn-outline-portal {
      border: 2px solid var(--primary);
      color: var(--primary);
      background: transparent;
      padding: 10px 28px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-outline-portal:hover {
      background: var(--primary);
      color: #fff;
    }
    .card-portal {
      border: 1px solid #e8dff0;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(123,45,139,0.06);
    }
    .section-title {
      color: var(--primary);
      font-weight: 700;
      font-size: 1.1rem;
    }
    .badge-pendiente { background: #fff3cd; color: #856404; }
    .badge-confirmada { background: #d1e7dd; color: #0f5132; }
    .badge-completada { background: #cfe2ff; color: #084298; }
    .badge-cancelada { background: #f8d7da; color: #842029; }
  </style>
</head>
<body>
  <header class="portal-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <a href="{% url 'portal:index' %}" class="text-white text-decoration-none">
            <div class="brand">GLAMOUR STYLE</div>
            <div class="tagline">Estetica Profesional</div>
          </a>
        </div>
        <nav class="portal-nav d-flex gap-1">
          <a href="{% url 'portal:agendar' %}" {% if request.resolver_match.url_name == 'agendar' %}class="active"{% endif %}>
            <i class="bi bi-calendar-plus me-1"></i>Agendar Cita
          </a>
          <a href="{% url 'portal:consultar' %}" {% if request.resolver_match.url_name == 'consultar' %}class="active"{% endif %}>
            <i class="bi bi-search me-1"></i>Mis Citas
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="portal-footer">
    <div>&copy; 2025 Glamour Style. Todos los derechos reservados.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
