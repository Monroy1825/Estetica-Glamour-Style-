<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Estética{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --color-primary: #7b2d8b; --color-primary-dark: #5e2069; }
    body { background-color: #f8f5fa; }
    .navbar-estetica { background-color: var(--color-primary); }
    .navbar-estetica .navbar-brand, .navbar-estetica .navbar-text { color: #fff !important; }

    #sidebar {
      width: 230px; min-height: calc(100vh - 56px);
      background-color: #fff; border-right: 1px solid #e4d4ec;
      position: fixed; top: 56px; left: 0; z-index: 100;
    }

    #main-content {
      margin-top: 56px;
      padding: 24px;
      min-height: calc(100vh - 56px);
      /* Si no hay usuario, el margen es 0 para que no se bloquee el login */
      margin-left: 0; 
    }

    /* Si el usuario entró, empujamos el contenido para el menú */
    body.logged-in #main-content { margin-left: 230px; }
  </style>
</head>
<body class="{% if user.is_authenticated %}logged-in{% endif %}">

<nav class="navbar navbar-estetica fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-scissors me-2"></i>Estética</a>
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-text">{{ user.username }}</span>
      <form method="post" action="/auth/logout/" class="m-0">
        {% csrf_token %}<button type="submit" class="btn btn-sm btn-outline-light">Salir</button>
      </form>
    </div>
    {% endif %}
  </div>
</nav>

{% if user.is_authenticated %}
<nav id="sidebar">
  <div class="p-3 fw-bold border-bottom">MENÚ</div>
  <div class="list-group list-group-flush">
    <a href="{% url 'clientes:list' %}" class="list-group-item list-group-item-action">Clientes</a>
    <a href="{% url 'operaciones:compra_list' %}" class="list-group-item list-group-item-action">Compras</a>
  </div>
</nav>
{% endif %}

<main id="main-content">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
