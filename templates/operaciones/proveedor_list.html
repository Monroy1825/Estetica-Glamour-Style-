{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-truck me-2" style="color:#7b2d8b"></i>Proveedores</h4>
</div>
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>Proveedor</th><th>Total Compras</th><th>Inversión Total</th></tr>
            </thead>
            <tbody>
            {% for p in proveedores %}
            <tr>
                <td>{{ p.proveedor }}</td>
                <td>{{ p.total_compras }}</td>
                <td>${{ p.inversion_total }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center text-muted py-4">Sin proveedores registrados.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
