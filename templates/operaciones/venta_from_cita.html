{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="mb-3">Crear Venta desde Cita #{{ view.cita.pk }}</h5>
        <p><strong>Cliente:</strong> {{ view.cita.cliente.nombre }}</p>
        <p><strong>Servicio:</strong> {{ view.cita.servicio.nombre }}</p>
        <p><strong>Total:</strong> ${{ view.cita.servicio.precio_base }}</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Registrar Venta</button>
                <a href="{% url 'operaciones:cita_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
